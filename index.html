<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>npc-oc</title>

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./public/assets/img/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./public/assets/img/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./public/assets/img/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="./public/assets/img/favicon/site.webmanifest" />
    <link
      rel="mask-icon"
      href="./public/assets/img/favicon/safari-pinned-tab.svg"
      color="#5bbad5"
    />
    <link
      rel="stylesheet"
      href="./public/assets/vendor/swiper/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="./public/assets/vendor/bootstrap/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./public/assets/css/main.min.css" />
    <link rel="stylesheet" href="./public/assets/css/style.css" />
  </head>
  <body>
    <div id="root"></div>
    <div id="chart-container"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- script start -->
    <script src="./public/assets/js/jquery-3.6.0.min.js.js"></script>
    <script src="./public/assets/js/popper.min.js"></script>
    <script src="./public/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="./public/assets/vendor/swiper/swiper-bundle.min.js"></script>

    <script src="./public/assets/vendor/aos/aos.js"></script>
    <script src="./public/assets/js/custom.js"></script>
    <script src="./public/assets/js/access.js"></script>

    <!-- //// qatar map  -->

    <script src="./public/assets/qatar-map-chart/d3.v7.min.js"></script>
    <script src="./public/assets/qatar-map-chart/min.js"></script>
    <script>
      AOS.init();
    </script>
    <script>
      // Chart dimensions
      const width = 250;
      const height = 250;
      const radius = Math.min(width, height) / 2;
      const innerRadius = radius * 0.7;
      const outerRadius = radius * 0.9;

      // Data for the chart segments
      const data = [
        { value: 25, color: "#9b2c4f" }, // Maroon/burgundy
        { value: 20, color: "#5a6473" }, // Gray-blue
        { value: 22, color: "#a89968" }, // Tan/gold
        { value: 33, color: "#1f4d5c" }, // Dark teal
      ];

      // Create SVG
      const svg = d3
        .select("#chart-pie")
        .attr("width", width)
        .attr("height", height)
        .append("g")
        .attr("transform", `translate(${width / 2}, ${height / 2})`);

      // Create pie layout
      const pie = d3
        .pie()
        .value((d) => d.value)
        .sort(null)
        .padAngle(0.02);

      // Create arc generator
      const arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius);

      // Draw arcs
      const arcs = svg
        .selectAll(".arc")
        .data(pie(data))
        .enter()
        .append("g")
        .attr("class", "arc");

      arcs
        .append("path")
        .attr("d", arc)
        .attr("fill", (d) => d.data.color)
        .attr("stroke", "white")
        .attr("stroke-width", 2);

      // Add center text
      const centerGroup = svg.append("g").attr("class", "center-text");

      centerGroup
        .append("text")
        .attr("class", "title")
        .attr("y", -35)
        .attr("text-anchor", "middle")
        .style("font-size", "16px")
        .style("fill", "#666")
        .text("Total Buildings");

      centerGroup
        .append("text")
        .attr("class", "number")
        .attr("y", 10)
        .attr("text-anchor", "middle")
        .style("font-size", "42px")
        .style("font-weight", "700")
        .style("fill", "#1a1a1a")
        .text("233,482");

      const subtitleGroup = centerGroup
        .append("text")
        .attr("y", 35)
        .attr("text-anchor", "middle")
        .style("font-size", "14px");

      subtitleGroup.append("tspan").style("fill", "#999").text("from 2025 ");

      subtitleGroup
        .append("tspan")
        .style("fill", "#10b981")
        .style("font-weight", "600")
        .text("▲+14.4%");
    </script>
    <script>
      const dataGrid = [
        { value: 100, color: "#a89579" },
        { value: 80, color: "#9b2557" },
        { value: 65, color: "#1a5678" },
        { value: 50, color: "#6b7280" },
      ];

      const margin = { top: 10, right: 0, bottom: 10, left: 0 };
      const widthGrid = 420;
      const heightGrid = 150;

      const svgGrid = d3
        .select("#chart")
        .attr("width", widthGrid + margin.left + margin.right)
        .attr("height", heightGrid + margin.top + margin.bottom)
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const barWidth = 80;
      const barSpacing = 8;
      const maxHeight = 120;

      const bars = svgGrid
        .selectAll(".bar")
        .data(dataGrid)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("x", (d, i) => i * (barWidth + barSpacing))
        .attr("y", heightGrid)
        .attr("width", barWidth)
        .attr("height", 0)
        .attr("rx", 8)
        .attr("fill", (d) => d.color);

      bars
        .transition()
        .duration(1000)
        .delay((d, i) => i * 100)
        .ease(d3.easeCubicOut)
        .attr("y", (d) => heightGrid - (d.value / 100) * maxHeight)
        .attr("height", (d) => (d.value / 100) * maxHeight);
    </script>
  </body>
</html>
